name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build runtime
        run: pnpm --dir packages/runtime run build

      - name: Run tests
        run: pnpm run test

      - name: Regenerate examples
        run: pnpm run generate:examples

      - name: Check generated diff
        run: git diff --exit-code

      - name: Pack tarball
        run: pnpm run pack:local

      - name: Consumer install smoke test
        run: pnpm run test:consumer
