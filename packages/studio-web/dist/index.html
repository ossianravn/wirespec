    <script>
      globalThis.{"login":{"id":"login","label":"Login","category":"Auth","summary":"Returning-user sign in with inline recovery and mobile submit visibility.","sourceFile":"docs/spec/v1-rc0/screens/01-login.md","source":"---\nschema: wirespec/1.0-rc0\nid: login\nroute: /login\ncomponent: auth/LoginScreen\ncanonical: true\npatterns:\n  - auth\n  - form\n  - inline-error\n  - mobile\n---\n\n# Login\n\n## Intent\nLet a returning user sign in quickly, recover access easily, and understand failures without losing context.\n\n```wirespec v=1 kind=base\nscreen id=login route=\"/login\" title=\"Sign in\"\n  main id=content width=fill align=center justify=center padding=lg\n    card id=auth-card width=fill max=sm\n      heading id=title level=1 text=\"Welcome back\"\n      text id=intro text=\"Use your work email and password.\"\n      form id=login-form submit=sign-in\n        field id=email type=email name=email label=\"Work email\" required=true autocomplete=email\n        field id=password type=password name=password label=\"Password\" required=true autocomplete=current-password\n        row id=assistive-row justify=between align=center\n          checkbox id=remember name=remember label=\"Remember me\"\n          link id=forgot href=\"/forgot-password\" label=\"Forgot password?\"\n        alert id=form-error tone=critical text=\"Incorrect email or password.\" visible=false\n        actions id=primary-actions\n          button id=submit variant=primary action=submit label=\"Sign in\"\n```\n\n```wirespec v=1 kind=state name=loading\npatch target=submit label=\"Signing in…\" busy=true disabled=true\npatch target=login-form disabled=true\n```\n\n```wirespec v=1 kind=state name=error\nshow target=form-error\npatch target=password invalid=true\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=599\npatch target=auth-card max=fill\npatch target=primary-actions direction=column width=fill\n```\n\n## Acceptance\n- Keyboard-only user can complete sign-in and trigger password recovery.\n- Inline error stays close to the password field and does not replace the field label.\n- Primary action remains visible without scrolling on common mobile widths.\n"},"workspace-onboarding":{"id":"workspace-onboarding","label":"Workspace onboarding","category":"Onboarding","summary":"Short setup form with stepper context and validation.","sourceFile":"docs/spec/v1-rc0/screens/02-workspace-onboarding.md","source":"---\nschema: wirespec/1.0-rc0\nid: workspace-onboarding\nroute: /welcome/workspace\ncomponent: onboarding/WorkspaceSetupScreen\ncanonical: true\npatterns:\n  - onboarding\n  - stepper\n  - setup-form\n  - validation\n---\n\n# Workspace onboarding\n\n## Intent\nHelp a new admin create a workspace with just the information needed to get started, without turning setup into a long wizard.\n\n```wirespec v=1 kind=base\nscreen id=workspace-onboarding route=\"/welcome/workspace\" title=\"Set up your workspace\"\n  main id=content width=fill align=center justify=center padding=lg\n    column id=setup-column width=fill max=md gap=lg\n      stepper id=setup-steps\n        step id=step-account label=\"Account\" current=true\n        step id=step-workspace label=\"Workspace\" current=true\n        step id=step-invite label=\"Invite\"\n      card id=setup-card width=fill\n        heading id=setup-title level=1 text=\"Create your workspace\"\n        text id=setup-copy text=\"Start with the details your team will see every day.\"\n        form id=setup-form submit=create-workspace\n          field id=workspace-name type=text name=workspace-name label=\"Workspace name\" required=true\n          helper id=name-help text=\"Use the team or company name people already recognize.\"\n          select id=team-size name=team-size label=\"Team size\" options=[\"2-10\",\"11-50\",\"51-200\",\"200+\"]\n          select id=data-region name=data-region label=\"Data region\" options=[\"EU\",\"US\",\"APAC\"]\n          checkbox id=sample-project name=sample-project label=\"Create a sample project\"\n          alert id=name-conflict tone=critical text=\"That workspace name is already taken.\" visible=false\n          actions id=setup-actions\n            button id=back variant=secondary action=back label=\"Back\"\n            button id=create-workspace variant=primary action=submit label=\"Create workspace\"\n```\n\n```wirespec v=1 kind=state name=submitting\npatch target=create-workspace label=\"Creating workspace…\" busy=true disabled=true\npatch target=setup-form disabled=true\n```\n\n```wirespec v=1 kind=state name=name-taken\nshow target=name-conflict\npatch target=workspace-name invalid=true\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=599\npatch target=setup-column padding=sm\npatch target=setup-steps direction=column\npatch target=setup-actions direction=column width=fill\n```\n\n## Acceptance\n- Setup stays focused on one short form instead of a sprawling wizard shell.\n- Workspace naming help is visible before the user submits.\n- The stepper remains understandable on mobile without becoming decorative overhead.\n"},"knowledge-search":{"id":"knowledge-search","label":"Knowledge search","category":"Search","summary":"Task-first search with filters, results, empty state, and mobile drawer behavior.","sourceFile":"docs/spec/v1-rc0/screens/03-knowledge-search.md","source":"---\nschema: wirespec/1.0-rc0\nid: knowledge-search\nroute: /knowledge/search\ncomponent: knowledge/SearchScreen\ncanonical: true\npatterns:\n  - search\n  - filters\n  - empty-state\n  - mobile-drawer\n---\n\n# Knowledge search\n\n## Intent\nSupport focused retrieval across articles, playbooks, and internal notes with filters that help without overpowering the search task.\n\n```wirespec v=1 kind=base\nscreen id=knowledge-search route=\"/knowledge/search\" title=\"Knowledge search\"\n  header id=search-header\n    toolbar id=search-toolbar\n      field id=query type=search name=query label=\"Search knowledge\" placeholder=\"Search articles, notes, and playbooks\"\n      button id=run-search variant=primary action=submit-search label=\"Search\"\n      button id=open-filters variant=secondary action=open-filters label=\"Filters\" visible=false\n  main id=search-main width=fill padding=lg\n    row id=search-layout align=start gap=lg\n      aside id=filters-panel width=sm\n        heading id=filters-title level=2 text=\"Filter results\"\n        form id=filter-form submit=apply-filters\n          checkbox id=filter-articles name=type-articles label=\"Articles\" checked=true\n          checkbox id=filter-playbooks name=type-playbooks label=\"Playbooks\" checked=true\n          checkbox id=filter-notes name=type-notes label=\"Notes\"\n          combobox id=topic-filter name=topic label=\"Topic\" placeholder=\"Choose a topic\"\n          actions id=filter-actions\n            button id=clear-filters variant=secondary action=clear-filters label=\"Clear filters\"\n            button id=apply-filters variant=primary action=submit label=\"Apply filters\"\n      section id=results-panel width=fill\n        row id=results-header justify=between align=center\n          heading id=results-title level=2 text=\"Results\"\n          helper id=result-count text=\"24 results\"\n        list id=results-list\n          list-item id=result-1\n            link id=result-1-link href=\"/knowledge/articles/customer-refunds\" label=\"Customer refunds by payment method\"\n            helper id=result-1-meta text=\"Article · Updated yesterday\"\n          list-item id=result-2\n            link id=result-2-link href=\"/knowledge/playbooks/chargeback-response\" label=\"Chargeback response checklist\"\n            helper id=result-2-meta text=\"Playbook · Updated 3 days ago\"\n        empty-state id=no-results title=\"No matching results\" description=\"Try broader terms or fewer filters.\" visible=false\n```\n\n```wirespec v=1 kind=state name=loading\nhide target=results-list\npatch target=results-panel busy=true\ninsert position=inside-start ref=results-panel\n  helper id=loading-copy text=\"Searching articles, notes, and playbooks…\"\n```\n\n```wirespec v=1 kind=state name=empty\nhide target=results-list\nshow target=no-results\npatch target=result-count text=\"0 results\"\n```\n\n```wirespec v=1 kind=state name=filters-open\ninsert position=inside-end ref=knowledge-search\n  drawer id=filters-drawer title=\"Filters\"\n    heading id=filters-drawer-title level=2 text=\"Filter results\"\n    form id=filters-drawer-form submit=apply-filters\n      checkbox id=drawer-filter-articles name=type-articles label=\"Articles\" checked=true\n      checkbox id=drawer-filter-playbooks name=type-playbooks label=\"Playbooks\" checked=true\n      checkbox id=drawer-filter-notes name=type-notes label=\"Notes\"\n      combobox id=drawer-topic-filter name=topic label=\"Topic\" placeholder=\"Choose a topic\"\n      actions id=filters-drawer-actions\n        button id=drawer-cancel variant=secondary action=close-filters label=\"Cancel\"\n        button id=drawer-apply variant=primary action=submit label=\"Apply filters\"\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=767\nhide target=filters-panel\nshow target=open-filters\npatch target=search-main padding=md\n```\n\n## Acceptance\n- Search remains the primary task; filters help but never dominate the screen.\n- Empty results explain what to do next without decorative filler.\n- Mobile users can access filters through a drawer without losing the query context.\n"},"fulfillment-queue":{"id":"fulfillment-queue","label":"Fulfillment queue","category":"Operations","summary":"Queue table with tabs, SLA context, and operator actions.","sourceFile":"docs/spec/v1-rc0/screens/04-fulfillment-queue.md","source":"---\nschema: wirespec/1.0-rc0\nid: fulfillment-queue\nroute: /warehouse/queue\ncomponent: warehouse/FulfillmentQueueScreen\ncanonical: true\npatterns:\n  - operations\n  - queue\n  - tabs\n  - table\n  - pagination\n---\n\n# Fulfillment queue\n\n## Intent\nHelp a warehouse operator move work forward from the queue itself, with the next action and shipment context visible at a glance.\n\n```wirespec v=1 kind=base\nscreen id=fulfillment-queue route=\"/warehouse/queue\" title=\"Fulfillment queue\"\n  header id=queue-header\n    row id=queue-header-row justify=between align=center\n      heading id=queue-title level=1 text=\"Fulfillment queue\"\n      toolbar id=queue-tools\n        field id=queue-search type=search name=queue-search label=\"Search orders\" placeholder=\"Order number, customer, or SKU\"\n        select id=station-filter name=station label=\"Station\" options=[\"All\",\"Packing\",\"Labeling\",\"Exceptions\"]\n  main id=queue-main padding=lg\n    column id=queue-content gap=lg\n      tabs id=queue-tabs\n        tab id=unassigned-tab label=\"Unassigned\" controls=unassigned-panel selected=true\n        tab id=packing-tab label=\"Packing\" controls=packing-panel\n        tab id=exceptions-tab label=\"Exceptions\" controls=exceptions-panel\n      tab-panel id=unassigned-panel\n        row id=queue-layout align=start gap=lg\n          section id=queue-table-region width=fill\n            table id=pick-table\n              table-header id=pick-table-header\n                table-row id=pick-head-row\n                  table-cell id=head-order text=\"Order\"\n                  table-cell id=head-customer text=\"Customer\"\n                  table-cell id=head-service text=\"Service\"\n                  table-cell id=head-sla text=\"SLA\"\n                  table-cell id=head-action text=\"Action\"\n              table-body id=pick-table-body\n                table-row id=order-4821-row\n                  table-cell id=order-4821-number text=\"#4821\"\n                  table-cell id=order-4821-customer text=\"Nordic Trail Supply\"\n                  table-cell id=order-4821-service text=\"Standard\"\n                  table-cell id=order-4821-sla\n                    badge id=order-4821-sla-badge tone=warning text=\"Due in 42 min\"\n                  table-cell id=order-4821-action\n                    button id=claim-4821 variant=primary action=claim-order label=\"Claim\"\n                table-row id=order-4827-row\n                  table-cell id=order-4827-number text=\"#4827\"\n                  table-cell id=order-4827-customer text=\"Akers Food Hall\"\n                  table-cell id=order-4827-service text=\"Cold chain\"\n                  table-cell id=order-4827-sla\n                    badge id=order-4827-sla-badge tone=critical text=\"Due in 12 min\"\n                  table-cell id=order-4827-action\n                    button id=claim-4827 variant=primary action=claim-order label=\"Claim\"\n            pagination id=queue-pagination current=1 count=14\n          aside id=shipment-summary width=md\n            panel id=shipment-panel\n              heading id=shipment-panel-title level=2 text=\"Selected shipment\"\n              text id=shipment-panel-copy text=\"Choose an order to see pick notes, handling requirements, and the next step.\"\n      tab-panel id=packing-panel\n        empty-state id=packing-empty title=\"No packing work assigned\" description=\"Move an order into packing to review handling notes and claim the next task.\"\n      tab-panel id=exceptions-panel\n        empty-state id=exceptions-empty title=\"No exceptions waiting\" description=\"Exception work appears here when an order needs a manual decision.\"\n```\n\n```wirespec v=1 kind=state name=loading\npatch target=pick-table busy=true\npatch target=claim-4821 disabled=true\npatch target=claim-4827 disabled=true\n```\n\n```wirespec v=1 kind=state name=row-selected\npatch target=order-4827-row selected=true\npatch target=shipment-panel-copy text=\"Cold chain order. Verify insulated packaging before sealing.\"\n```\n\n```wirespec v=1 kind=breakpoint name=tablet max=1023\nhide target=shipment-summary\npatch target=queue-main padding=md\n```\n\n## Acceptance\n- The queue leads with actionable work rather than summary cards or ornamental status panels.\n- SLA urgency is clear in the row without requiring the operator to open a detail screen first.\n- Tablet layout preserves the queue as the primary surface without side-panel clutter.\n"},"case-detail":{"id":"case-detail","label":"Case detail","category":"Detail","summary":"Split-layout case triage with breadcrumbs, summary, timeline, and actions.","sourceFile":"docs/spec/v1-rc0/screens/05-case-detail.md","source":"---\nschema: wirespec/1.0-rc0\nid: case-detail\nroute: /cases/3482\ncomponent: cases/CaseDetailScreen\ncanonical: true\npatterns:\n  - case-detail\n  - breadcrumbs\n  - split-layout\n  - confirmation-dialog\n---\n\n# Case detail\n\n## Intent\nHelp an operations specialist understand the case quickly, see the timeline, and take the next responsible action without scanning unrelated chrome.\n\n```wirespec v=1 kind=base\nscreen id=case-detail route=\"/cases/3482\" title=\"Case 3482\"\n  header id=case-header\n    breadcrumbs id=case-breadcrumbs\n      breadcrumb-item id=crumb-cases label=\"Cases\"\n      breadcrumb-item id=crumb-case-3482 label=\"Case 3482\"\n    row id=case-header-row justify=between align=center\n      column id=case-title-block\n        heading id=case-title level=1 text=\"Case 3482 — Missing customs invoice\"\n        helper id=case-subtitle text=\"Opened by Logistics on 11 Apr\"\n      actions id=case-actions\n        button id=reassign-case variant=secondary action=reassign-case label=\"Reassign\"\n        button id=close-case variant=primary action=close-case label=\"Close case\"\n  main id=case-main padding=lg\n    row id=case-layout align=start gap=lg\n      section id=case-body width=fill\n        panel id=case-summary\n          heading id=summary-title level=2 text=\"Summary\"\n          text id=summary-copy text=\"Shipment 7714 is held at customs because the invoice PDF was not attached to the export packet.\"\n        section id=timeline-section\n          heading id=timeline-title level=2 text=\"Timeline\"\n          list id=timeline-list\n            list-item id=timeline-1\n              text id=timeline-1-copy text=\"09:08 — Shipment flagged by customs broker.\"\n            list-item id=timeline-2\n              text id=timeline-2-copy text=\"09:21 — Warehouse confirmed the parcel is still on site.\"\n            list-item id=timeline-3\n              text id=timeline-3-copy text=\"09:37 — Finance uploaded the corrected invoice.\"\n      aside id=case-sidebar width=md\n        panel id=owner-panel\n          heading id=owner-title level=2 text=\"Ownership\"\n          text id=owner-copy text=\"Assigned to Eva Madsen\"\n        panel id=next-step-panel\n          heading id=next-step-title level=2 text=\"Next step\"\n          text id=next-step-copy text=\"Send the corrected invoice to the customs broker and confirm release.\"\n```\n\n```wirespec v=1 kind=state name=confirm-close\ninsert position=inside-end ref=case-detail\n  dialog id=close-case-dialog title=\"Close case?\"\n    heading id=close-case-dialog-title level=2 text=\"Close case 3482?\"\n    text id=close-case-dialog-copy text=\"Only close the case if customs release has been confirmed.\"\n    actions id=close-case-dialog-actions\n      button id=cancel-close variant=secondary action=cancel-close label=\"Cancel\"\n      button id=confirm-close variant=primary action=confirm-close label=\"Close case\"\n```\n\n```wirespec v=1 kind=state name=resolved\npatch target=case-subtitle text=\"Resolved on 11 Apr\"\npatch target=close-case label=\"Closed\" disabled=true\npatch target=next-step-copy text=\"Case closed after customs release confirmation.\"\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=767\npatch target=case-layout direction=column\npatch target=case-main padding=md\n```\n\n## Acceptance\n- The case summary and next step are discoverable within a quick scan.\n- Timeline items remain readable on mobile without a separate drill-down.\n- Confirmation is required before closing the case.\n"},"security-settings":{"id":"security-settings","label":"Security settings","category":"Settings","summary":"Policy-first settings with tabs, switches, and access management.","sourceFile":"docs/spec/v1-rc0/screens/06-security-settings.md","source":"---\nschema: wirespec/1.0-rc0\nid: security-settings\nroute: /settings/security\ncomponent: settings/SecuritySettingsScreen\ncanonical: true\npatterns:\n  - settings\n  - tabs\n  - switches\n  - list-management\n---\n\n# Security settings\n\n## Intent\nGive administrators a calm, policy-first place to manage account protection and approved access without turning settings into a decorative dashboard.\n\n```wirespec v=1 kind=base\nscreen id=security-settings route=\"/settings/security\" title=\"Security settings\"\n  header id=settings-header\n    heading id=settings-title level=1 text=\"Security settings\"\n  main id=settings-main padding=lg\n    column id=settings-content gap=lg\n      tabs id=settings-tabs\n        tab id=policies-tab label=\"Policies\" controls=policies-panel selected=true\n        tab id=access-tab label=\"Access\" controls=access-panel\n        tab id=audit-tab label=\"Audit\" controls=audit-panel\n      tab-panel id=policies-panel\n        section id=sign-in-policy\n          heading id=sign-in-policy-title level=2 text=\"Sign-in policy\"\n          switch id=require-sso name=require-sso label=\"Require SSO for all members\"\n          switch id=require-passkeys name=require-passkeys label=\"Require passkeys for admins\"\n          select id=session-timeout name=session-timeout label=\"Session timeout\" options=[\"4 hours\",\"8 hours\",\"24 hours\",\"7 days\"]\n        section id=password-reset-policy\n          heading id=password-reset-title level=2 text=\"Password reset\"\n          checkbox id=notify-admin name=notify-admin label=\"Notify admins when a privileged account resets a password\"\n      tab-panel id=access-panel visible=false\n        section id=approved-domains\n          row id=domain-header justify=between align=center\n            heading id=approved-domains-title level=2 text=\"Approved domains\"\n            button id=add-domain variant=secondary action=open-add-domain label=\"Add domain\"\n          list id=domain-list\n            list-item id=domain-1\n              text id=domain-1-copy text=\"acme-logistics.com\"\n            list-item id=domain-2\n              text id=domain-2-copy text=\"acme-warehouse.eu\"\n      tab-panel id=audit-panel visible=false\n        section id=audit-alerts\n          heading id=audit-alerts-title level=2 text=\"Audit alerts\"\n          switch id=alert-new-admin name=alert-new-admin label=\"Alert on new admin role grants\"\n          switch id=alert-suspicious-login name=alert-suspicious-login label=\"Alert on suspicious sign-ins\"\n```\n\n```wirespec v=1 kind=state name=access\nhide target=policies-panel\nshow target=access-panel\nhide target=audit-panel\npatch target=policies-tab selected=false\npatch target=access-tab selected=true\npatch target=audit-tab selected=false\n```\n\n```wirespec v=1 kind=state name=audit\nhide target=policies-panel\nhide target=access-panel\nshow target=audit-panel\npatch target=policies-tab selected=false\npatch target=access-tab selected=false\npatch target=audit-tab selected=true\n```\n\n```wirespec v=1 kind=state name=add-domain\ninsert position=inside-end ref=security-settings\n  dialog id=add-domain-dialog title=\"Add approved domain\"\n    heading id=add-domain-dialog-title level=2 text=\"Add approved domain\"\n    form id=add-domain-form submit=save-domain\n      field id=domain-input type=text name=domain label=\"Domain\" placeholder=\"example.com\" required=true\n      actions id=add-domain-dialog-actions\n        button id=cancel-domain variant=secondary action=cancel-domain label=\"Cancel\"\n        button id=save-domain variant=primary action=submit label=\"Save domain\"\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=767\npatch target=settings-main padding=md\npatch target=settings-tabs direction=column\npatch target=domain-header direction=column\n```\n\n## Acceptance\n- Security policy controls are grouped by decision area, not by component type.\n- Tabs switch clear sections without leaving multiple competing panels on screen.\n- Domain management includes a focused add-domain dialog rather than inline clutter.\n"},"checkout":{"id":"checkout","label":"Checkout","category":"Commerce","summary":"Shipping form with order summary and recovery state.","sourceFile":"docs/spec/v1-rc0/screens/07-checkout.md","source":"---\nschema: wirespec/1.0-rc0\nid: checkout\nroute: /checkout\ncomponent: commerce/CheckoutScreen\ncanonical: true\npatterns:\n  - commerce\n  - stepper\n  - shipping-form\n  - order-summary\n---\n\n# Checkout\n\n## Intent\nLet a buyer complete shipping and delivery choices with confidence, while keeping the order summary close enough to verify without hijacking the flow.\n\n```wirespec v=1 kind=base\nscreen id=checkout route=\"/checkout\" title=\"Checkout\"\n  main id=checkout-main padding=lg\n    row id=checkout-layout align=start gap=lg\n      section id=checkout-flow width=fill\n        stepper id=checkout-steps\n          step id=step-cart label=\"Cart\"\n          step id=step-shipping label=\"Shipping\" current=true\n          step id=step-review label=\"Review\"\n        form id=shipping-form submit=continue-to-review\n          heading id=shipping-title level=1 text=\"Shipping details\"\n          field id=full-name type=text name=full-name label=\"Full name\" required=true\n          field id=address-line-1 type=text name=address-line-1 label=\"Address line 1\" required=true\n          field id=address-line-2 type=text name=address-line-2 label=\"Address line 2\"\n          row id=city-row gap=md\n            field id=city type=text name=city label=\"City\" required=true\n            field id=postal-code type=text name=postal-code label=\"Postal code\" required=true\n          select id=country name=country label=\"Country\" options=[\"Denmark\",\"Sweden\",\"Germany\",\"Norway\"]\n          radio-group id=delivery-speed name=delivery-speed label=\"Delivery speed\"\n            radio id=delivery-standard value=standard label=\"Standard — 2 to 4 business days\"\n            radio id=delivery-express value=express label=\"Express — next business day\"\n          checkbox id=billing-same name=billing-same label=\"Billing address is the same\"\n          alert id=payment-error tone=critical text=\"Your payment authorization could not be completed.\" visible=false\n          actions id=checkout-actions\n            link id=return-to-cart href=\"/cart\" label=\"Back to cart\"\n            button id=continue-to-review variant=primary action=submit label=\"Continue to review\"\n      aside id=order-summary width=md\n        panel id=summary-panel\n          heading id=summary-title level=2 text=\"Order summary\"\n          list id=summary-items\n            list-item id=item-1\n              text id=item-1-copy text=\"Trail jacket ×1\"\n            list-item id=item-2\n              text id=item-2-copy text=\"Insulated bottle ×2\"\n          divider id=summary-divider\n          text id=summary-total text=\"Total: 1,240 DKK\"\n```\n\n```wirespec v=1 kind=state name=payment-failed\nshow target=payment-error\npatch target=continue-to-review label=\"Try again\"\n```\n\n```wirespec v=1 kind=state name=submitting\npatch target=continue-to-review label=\"Saving details…\" busy=true disabled=true\npatch target=shipping-form disabled=true\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=767\npatch target=checkout-layout direction=column\npatch target=order-summary order=before\npatch target=checkout-main padding=md\npatch target=checkout-actions direction=column width=fill\n```\n\n## Acceptance\n- Order summary stays available without stealing attention from the form.\n- Delivery choices are explicit and readable, not compressed into unlabeled chips.\n- Mobile layout preserves both verification and forward progress.\n"},"clinic-scheduler":{"id":"clinic-scheduler","label":"Clinic scheduler","category":"Scheduling","summary":"Day schedule grid with provider filters and mobile agenda fallback.","sourceFile":"docs/spec/v1-rc0/screens/08-clinic-scheduler.md","source":"---\nschema: wirespec/1.0-rc0\nid: clinic-scheduler\nroute: /schedule/clinic\ncomponent: clinic/DaySchedulerScreen\ncanonical: true\npatterns:\n  - scheduler\n  - table\n  - filters\n  - mobile-agenda\n---\n\n# Clinic scheduler\n\n## Intent\nHelp front-desk staff manage the day schedule quickly, with clear slot occupancy, provider context, and a workable mobile fallback.\n\n```wirespec v=1 kind=base\nscreen id=clinic-scheduler route=\"/schedule/clinic\" title=\"Clinic scheduler\"\n  header id=scheduler-header\n    row id=scheduler-header-row justify=between align=center\n      heading id=scheduler-title level=1 text=\"Clinic scheduler\"\n      toolbar id=scheduler-tools\n        button id=previous-day variant=secondary action=previous-day label=\"Previous day\"\n        field id=schedule-date type=date name=schedule-date label=\"Date\"\n        button id=next-day variant=secondary action=next-day label=\"Next day\"\n        combobox id=provider-filter name=provider label=\"Provider\" placeholder=\"All providers\"\n        select id=room-filter name=room label=\"Room\" options=[\"All rooms\",\"Room 1\",\"Room 2\",\"Room 3\"]\n  main id=scheduler-main padding=lg\n    row id=scheduler-layout align=start gap=lg\n      section id=scheduler-grid-region width=fill\n        table id=schedule-grid\n          table-header id=schedule-grid-header\n            table-row id=schedule-grid-head-row\n              table-cell id=head-time text=\"Time\"\n              table-cell id=head-provider-1 text=\"Dr. Park\"\n              table-cell id=head-provider-2 text=\"Dr. Silva\"\n          table-body id=schedule-grid-body\n            table-row id=row-0900\n              table-cell id=time-0900 text=\"09:00\"\n              table-cell id=park-0900\n                button id=appt-0900-park variant=secondary action=open-appointment label=\"Nguyen — follow-up\"\n              table-cell id=silva-0900\n                button id=open-slot-0900-silva variant=tertiary action=create-appointment label=\"Open slot\"\n            table-row id=row-0930\n              table-cell id=time-0930 text=\"09:30\"\n              table-cell id=park-0930\n                button id=open-slot-0930-park variant=tertiary action=create-appointment label=\"Open slot\"\n              table-cell id=silva-0930\n                button id=appt-0930-silva variant=secondary action=open-appointment label=\"Larsen — annual review\"\n      aside id=appointment-sidebar width=md\n        panel id=appointment-panel\n          heading id=appointment-title level=2 text=\"Appointment details\"\n          text id=appointment-copy text=\"Select an appointment or open slot to review notes and booking options.\"\n```\n\n```wirespec v=1 kind=state name=appointment-selected\npatch target=appt-0900-park selected=true\npatch target=appointment-copy text=\"Nguyen — follow-up visit. Interpreter requested. Arrive 10 minutes early.\"\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=767\nhide target=schedule-grid\nhide target=appointment-sidebar\ninsert position=inside-end ref=scheduler-grid-region\n  list id=mobile-agenda\n    list-item id=mobile-item-0900-park\n      button id=mobile-appt-0900-park variant=secondary action=open-appointment label=\"09:00 — Nguyen with Dr. Park\"\n    list-item id=mobile-item-0930-silva\n      button id=mobile-appt-0930-silva variant=secondary action=open-appointment label=\"09:30 — Larsen with Dr. Silva\"\n```\n\n```wirespec v=1 kind=state name=appointment-drawer\ninsert position=inside-end ref=clinic-scheduler\n  drawer id=appointment-drawer title=\"Appointment details\"\n    heading id=appointment-drawer-title level=2 text=\"Appointment details\"\n    text id=appointment-drawer-copy text=\"Nguyen — follow-up visit. Interpreter requested. Arrive 10 minutes early.\"\n    actions id=appointment-drawer-actions\n      button id=reschedule-visit variant=secondary action=reschedule-visit label=\"Reschedule\"\n      button id=check-in variant=primary action=check-in label=\"Check in\"\n```\n\n## Acceptance\n- The day schedule reads as a working schedule, not as a KPI dashboard.\n- Occupied and open slots are clearly distinguishable.\n- Mobile fallback switches to an agenda list instead of forcing a cramped time grid.\n"},"support-conversation":{"id":"support-conversation","label":"Support conversation","category":"Conversation","summary":"Thread-first support workflow with composer and details drawer.","sourceFile":"docs/spec/v1-rc0/screens/09-support-conversation.md","source":"---\nschema: wirespec/1.0-rc0\nid: support-conversation\nroute: /support/conversations/551\ncomponent: support/ConversationScreen\ncanonical: true\npatterns:\n  - support\n  - thread\n  - composer\n  - details-drawer\n---\n\n# Support conversation\n\n## Intent\nHelp a support agent reply with context, while keeping the conversation thread primary and the case details secondary.\n\n```wirespec v=1 kind=base\nscreen id=support-conversation route=\"/support/conversations/551\" title=\"Support conversation\"\n  header id=conversation-header\n    row id=conversation-header-row justify=between align=center\n      column id=conversation-title-block\n        heading id=conversation-title level=1 text=\"Refund status for order #4821\"\n        helper id=conversation-subtitle text=\"Customer waiting 2 hours · Medium priority\"\n      button id=open-details variant=secondary action=open-details label=\"Details\" visible=false\n  main id=conversation-main padding=lg\n    row id=conversation-layout align=start gap=lg\n      section id=thread-region width=fill\n        list id=thread-list\n          list-item id=message-1\n            text id=message-1-copy text=\"Customer: I still have not received the refund confirmation.\"\n          list-item id=message-2\n            text id=message-2-copy text=\"Agent: I’m checking the payout status with finance now.\"\n        form id=composer-form submit=send-reply\n          textarea id=reply-body name=reply-body label=\"Reply\" required=true\n          alert id=send-error tone=critical text=\"Reply could not be sent. Please try again.\" visible=false\n          actions id=composer-actions\n            button id=save-draft variant=secondary action=save-draft label=\"Save draft\"\n            button id=send-reply variant=primary action=submit label=\"Send reply\"\n      aside id=details-sidebar width=md\n        panel id=details-panel\n          heading id=details-title level=2 text=\"Case details\"\n          text id=details-copy text=\"Refund approved. Waiting for payout confirmation from finance.\"\n```\n\n```wirespec v=1 kind=state name=sending\npatch target=send-reply label=\"Sending…\" busy=true disabled=true\npatch target=composer-form disabled=true\n```\n\n```wirespec v=1 kind=state name=send-failed\nshow target=send-error\npatch target=reply-body invalid=true\n```\n\n```wirespec v=1 kind=state name=details-open\ninsert position=inside-end ref=support-conversation\n  drawer id=details-drawer title=\"Case details\"\n    heading id=details-drawer-title level=2 text=\"Case details\"\n    text id=details-drawer-copy text=\"Refund approved. Waiting for payout confirmation from finance.\"\n    actions id=details-drawer-actions\n      button id=close-details variant=primary action=close-details label=\"Close\"\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=767\nhide target=details-sidebar\nshow target=open-details\npatch target=conversation-layout direction=column\npatch target=conversation-main padding=md\n```\n\n## Acceptance\n- Conversation thread stays primary; case details remain available without becoming a competing rail on mobile.\n- Error state is close to the reply box and does not erase draft text.\n- The send action remains obvious and keyboard-reachable.\n"},"article-editor":{"id":"article-editor","label":"Article editor","category":"Editor","summary":"Focused writing surface with tabs, preview, and publishing settings.","sourceFile":"docs/spec/v1-rc0/screens/10-article-editor.md","source":"---\nschema: wirespec/1.0-rc0\nid: article-editor\nroute: /content/articles/new\ncomponent: content/ArticleEditorScreen\ncanonical: true\npatterns:\n  - editor\n  - toolbar\n  - tabs\n  - publish-settings\n---\n\n# Article editor\n\n## Intent\nHelp an editor write, preview, and publish an article from one focused workspace without turning the editor into a decorative content dashboard.\n\n```wirespec v=1 kind=base\nscreen id=article-editor route=\"/content/articles/new\" title=\"New article\"\n  header id=editor-header\n    row id=editor-header-row justify=between align=center\n      heading id=editor-title level=1 text=\"New article\"\n      actions id=editor-top-actions\n        button id=discard-draft variant=secondary action=discard-draft label=\"Discard\"\n        button id=publish-now variant=primary action=publish-now label=\"Publish\"\n  main id=editor-main padding=lg\n    row id=editor-layout align=start gap=lg\n      section id=editor-body width=fill\n        toolbar id=editor-toolbar\n          button id=toolbar-bold variant=secondary action=toggle-bold label=\"Bold\"\n          button id=toolbar-italic variant=secondary action=toggle-italic label=\"Italic\"\n          link id=editor-style-guide href=\"/content/style-guide\" label=\"Style guide\"\n        field id=article-title-input type=text name=article-title label=\"Title\" required=true\n        textarea id=article-summary name=article-summary label=\"Summary\"\n        tabs id=editor-tabs\n          tab id=write-tab label=\"Write\" controls=write-panel selected=true\n          tab id=preview-tab label=\"Preview\" controls=preview-panel\n        tab-panel id=write-panel\n          textarea id=article-body name=article-body label=\"Body\" required=true\n        tab-panel id=preview-panel visible=false\n          panel id=preview-surface\n            heading id=preview-surface-title level=2 text=\"Preview\"\n            text id=preview-surface-copy text=\"Rendered article preview appears here.\"\n      aside id=publish-sidebar width=md\n        panel id=publish-panel\n          heading id=publish-panel-title level=2 text=\"Publishing\"\n          field id=slug type=text name=slug label=\"Slug\" required=true\n          select id=article-audience name=article-audience label=\"Audience\" options=[\"All customers\",\"Enterprise customers\",\"Internal only\"]\n          helper id=autosave-status text=\"Saved just now\"\n```\n\n```wirespec v=1 kind=state name=autosaving\npatch target=autosave-status text=\"Saving draft…\"\npatch target=publish-now disabled=true\n```\n\n```wirespec v=1 kind=state name=preview\nhide target=write-panel\nshow target=preview-panel\npatch target=write-tab selected=false\npatch target=preview-tab selected=true\n```\n\n```wirespec v=1 kind=state name=publish-validation-error\ninsert position=inside-start ref=publish-panel\n  alert id=publish-alert tone=critical text=\"Title, body, and slug are required before publishing.\"\npatch target=publish-now disabled=true\n```\n\n```wirespec v=1 kind=breakpoint name=mobile max=767\nhide target=publish-sidebar\ninsert position=inside-end ref=article-editor\n  drawer id=publish-drawer title=\"Publishing\"\n    heading id=publish-drawer-title level=2 text=\"Publishing\"\n    field id=drawer-slug type=text name=slug label=\"Slug\" required=true\n    select id=drawer-audience name=article-audience label=\"Audience\" options=[\"All customers\",\"Enterprise customers\",\"Internal only\"]\n    actions id=publish-drawer-actions\n      button id=close-publish-drawer variant=secondary action=close-publish-drawer label=\"Close\"\n      button id=drawer-publish-now variant=primary action=publish-now label=\"Publish\"\npatch target=editor-main padding=md\npatch target=editor-layout direction=column\n```\n\n## Acceptance\n- Writing remains the primary workspace; publishing controls are nearby but secondary.\n- Preview is a clear alternate mode, not a second competing screen.\n- Mobile users can still publish through a drawer without losing the editing context.\n"}} = __WS_STUDIO_TEMPLATE_LIBRARY__;
