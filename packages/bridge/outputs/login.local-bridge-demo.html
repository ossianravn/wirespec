      :root {

      *,

        box-sizing: border-box;
      }

      }
      main[data-ws-screen="login"] {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }
      [data-ws-id="auth-card"] {
        width: min(420px, 100%);
        background: #fff;
        border: 1px solid rgba(17,17,17,0.10);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 10px 24px rgba(17,17,17,0.05);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.1;
      }
      p {
        margin: 0;
      }
      form {
        display: grid;
        gap: 14px;
        margin-top: 20px;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
      }
      input {
        border: 1px solid rgba(17,17,17,0.14);
        border-radius: 10px;
        min-height: 42px;
        padding: 0 12px;
        font: inherit;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .error {
        padding: 10px 12px;
        border: 1px solid rgba(17,17,17,0.14);
        border-radius: 10px;
        background: #fbfbfb;
        color: rgba(17,17,17,0.80);
        font-size: 14px;
      }
      button.primary {
        appearance: none;
        min-height: 44px;
        border: 1px solid #111;
        border-radius: 10px;
        background: #111;
        color: #fff;
        font: 600 15px/1 Inter, ui-sans-serif, system-ui, sans-serif;
        padding: 0 14px;
      }
      .subtle-link {
        color: #111;
        font-size: 14px;
        text-decoration: none;
      }
